# Nephrite 8-hub topology — the NZ FTR market hubs.
# Corridor capacities/losses are INDICATIVE; refined in Plan 2 against
# Transpower data and EMI binding-constraint analysis. Boundaries follow
# historically binding corridors per the Phase 1 spec.

[[hubs]]
code = "OTA"
node = "OTA2201"
name = "Otahuhu"
island = "NI"

[[hubs]]
code = "WKM"
node = "WKM2201"
name = "Whakamaru"
island = "NI"

[[hubs]]
code = "RDF"
node = "RDF2201"
name = "Redclyffe"
island = "NI"

[[hubs]]
code = "HAY"
node = "HAY2201"
name = "Haywards"
island = "NI"

[[hubs]]
code = "KIK"
node = "KIK2201"
name = "Kikiwa"
island = "SI"

[[hubs]]
code = "ISL"
node = "ISL2201"
name = "Islington"
island = "SI"

[[hubs]]
code = "BEN"
node = "BEN2201"
name = "Benmore"
island = "SI"

[[hubs]]
code = "INV"
node = "INV2201"
name = "Invercargill"
island = "SI"

[[corridors]]
from = "OTA"
to = "WKM"
capacity_fwd_mw = 2300.0
